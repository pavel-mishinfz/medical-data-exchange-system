{% extends "base.html" %}

{% block navbar %}
{% endblock navbar %}


{% block content %}
<div class="row align-items-center justify-content-center" style="height: 100vh">
  <div class="col-4">
      <form id="login-form" style="padding: 20px; border: 1px solid #000; border-radius: 15px">
          <div>
              <label for="id_email" class="form-label">Email</label>
              <input type="email" class="form-control" name="username" id="id_email">
          </div>
          <div>
              <label for="id_password" class="form-label">Пароль</label>
              <input type="password" class="form-control" name="password" id="id_password">
          </div>
          <div>
              <small>
                  <a href="#">Забыли пароль?</a>
              </small>
          </div>
          <div class="d-flex justify-content-center">
            <button type="submit" class="mt-2 btn btn-primary">Войти</button>
          </div>
          <hr>
          <div class="text-center">
              <small>Нажмите регистрация, если Вы не имеете аккаунта</small>
          </div>
      </form>
  </div>
</div>
{% endblock content %}



{% block scripts %}
<script src="{{ url_for('static', path='js/login.js') }}"></script>
{% endblock scripts %}
